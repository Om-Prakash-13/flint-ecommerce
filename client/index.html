<!doctype html>
<html lang="en">

  <head>

    <!-- charset -->
    <meta charset="UTF-8" />


    <!-- responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />


    <!-- favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/flint.png"
    />


    <!-- title -->
    <title>
      Flint — Premium E-Commerce Experience
    </title>


    <!-- seo -->
    <meta
      name="description"
      content="
        Discover premium products across
        electronics, fashion, home, and
        lifestyle categories with Flint.
      "
    />


    <!-- browser theme -->
    <meta
      name="theme-color"
      content="#000000"
    />


    <!-- open graph -->
    <meta
      property="og:title"
      content="
        Flint — Premium E-Commerce Experience
      "
    />

    <meta
      property="og:description"
      content="
        Shop premium products with
        fast delivery, secure checkout,
        and modern shopping experiences.
      "
    />

    <meta
      property="og:image"
      content="/flint.png"
    />

    <meta
      property="og:type"
      content="website"
    />


    <!-- twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

  </head>

      type="module"
